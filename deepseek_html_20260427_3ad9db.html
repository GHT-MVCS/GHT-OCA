<!DOCTYPE html>
<html>
<head><title>Test Proxy Codespaces</title></head>
<body>
<pre id="out">Cargando...</pre>
<script>
fetch('http://localhost:8010/proxy/api/v2/registration/N342AV')
  .then(r => r.json())
  .then(data => {
    if (data.ac && data.ac.length) {
      const v = data.ac[0];
      document.getElementById('out').innerHTML = `
        ✅ Vuelo ${v.flight}<br>
        📍 ${v.lat}, ${v.lon}<br>
        Alt: ${v.alt_baro} ft<br>
        Vel: ${v.gs} kt
      `;
    } else {
      document.getElementById('out').innerHTML = '❌ No activo';
    }
  })
  .catch(e => document.getElementById('out').innerHTML = '❌ Error: ' + e.message);
</script>
</body>
</html>
